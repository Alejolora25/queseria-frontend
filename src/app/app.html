<div class="app-shell min-h-dvh bg-slate-50 text-slate-950">
  <aside class="app-sidebar fixed inset-y-0 left-0 z-30 hidden w-[280px] flex-col border-r border-slate-200 bg-white lg:flex">
    <div class="flex h-full flex-col px-5 py-6">
      <div class="mb-8">
        <div class="flex items-center gap-3">
          <div class="app-brand-mark flex h-11 w-11 items-center justify-center rounded-2xl bg-sky-700 text-sm font-bold text-white shadow-sm">
            Q
          </div>
          <div>
            <div class="text-lg font-semibold tracking-tight">Quesería</div>
            <div class="text-xs font-medium uppercase tracking-[0.16em] text-slate-500">
              Calidad de leche
            </div>
          </div>
        </div>
      </div>

      <nav class="space-y-2" aria-label="Navegación principal">
        <a
          *ngFor="let item of navItems"
          [routerLink]="item.route"
          routerLinkActive="is-active"
          [routerLinkActiveOptions]="{ exact: true }"
          class="app-nav-link group flex items-center gap-3 rounded-2xl px-3 py-3 text-sm font-medium text-slate-600 transition"
        >
          <span class="app-nav-icon flex h-10 w-10 items-center justify-center rounded-xl bg-slate-100 text-slate-500 transition">
            <mat-icon>{{ item.icon }}</mat-icon>
          </span>
          <span class="min-w-0">
            <span class="block truncate">{{ item.label }}</span>
            <span class="block truncate text-xs font-normal text-slate-400">{{ item.description }}</span>
          </span>
        </a>
      </nav>

      <div class="mt-auto rounded-2xl border border-slate-200 bg-slate-50 p-4">
        <div class="text-xs font-semibold uppercase tracking-[0.16em] text-slate-500">MVP</div>
        <div class="mt-1 text-sm font-medium text-slate-800">Módulo calidad</div>
      </div>
    </div>
  </aside>

  <header class="sticky top-0 z-20 border-b border-slate-200 bg-white/95 backdrop-blur lg:hidden">
    <div class="flex h-16 items-center justify-between px-4">
      <button
        mat-icon-button
        type="button"
        aria-label="Abrir menú"
        (click)="toggleMobileMenu()"
      >
        <mat-icon>menu</mat-icon>
      </button>

      <div class="text-center">
        <div class="font-semibold leading-tight">Quesería</div>
        <div class="text-xs text-slate-500">Calidad de leche</div>
      </div>

      <div class="h-10 w-10"></div>
    </div>
  </header>

  <div
    *ngIf="mobileMenuOpen()"
    class="fixed inset-0 z-40 bg-slate-950/45 backdrop-blur-sm lg:hidden"
    (click)="closeMobileMenu()"
  ></div>

  <aside
    *ngIf="mobileMenuOpen()"
    class="fixed inset-y-0 left-0 z-50 w-[min(320px,86vw)] border-r border-slate-200 bg-white shadow-2xl lg:hidden"
  >
    <div class="flex h-full flex-col px-5 py-5">
      <div class="mb-7 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="flex h-10 w-10 items-center justify-center rounded-2xl bg-sky-700 text-sm font-bold text-white">
            Q
          </div>
          <div>
            <div class="font-semibold">Quesería</div>
            <div class="text-xs text-slate-500">Calidad de leche</div>
          </div>
        </div>

        <button mat-icon-button type="button" aria-label="Cerrar menú" (click)="closeMobileMenu()">
          <mat-icon>close</mat-icon>
        </button>
      </div>

      <nav class="space-y-2" aria-label="Navegación móvil">
        <a
          *ngFor="let item of navItems"
          [routerLink]="item.route"
          routerLinkActive="is-active"
          [routerLinkActiveOptions]="{ exact: true }"
          class="app-nav-link group flex items-center gap-3 rounded-2xl px-3 py-3 text-sm font-medium text-slate-600 transition"
        >
          <span class="app-nav-icon flex h-10 w-10 items-center justify-center rounded-xl bg-slate-100 text-slate-500 transition">
            <mat-icon>{{ item.icon }}</mat-icon>
          </span>
          <span>
            <span class="block">{{ item.label }}</span>
            <span class="block text-xs font-normal text-slate-400">{{ item.description }}</span>
          </span>
        </a>
      </nav>
    </div>
  </aside>

  <main class="min-h-dvh lg:pl-[280px]">
    <div class="mx-auto w-full max-w-7xl px-4 py-5 sm:px-6 sm:py-7 lg:px-8 lg:py-8">
      <section class="app-card mb-5 px-5 py-4 sm:px-6">
        <div class="flex flex-col gap-1">
          <p class="text-xs font-semibold uppercase tracking-[0.18em] text-sky-700">
            Calidad de leche
          </p>
          <h1 class="text-2xl font-semibold tracking-tight text-slate-950">
            {{ currentPage().label }}
          </h1>
          <p class="text-sm text-slate-500">
            {{ currentPage().description }}
          </p>
        </div>
      </section>

      <router-outlet />
    </div>
  </main>
</div>
